name: Build ChatPro

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npx electron-builder --win --x64 --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: ChatPro-Windows
          path: dist/*.exe
          retention-days: 30

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npx electron-builder --mac --x64 --arm64 --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: ChatPro-Mac
          path: |
            dist/*.dmg
            dist/*.zip
          retention-days: 30

name: Build & Release ChatPro

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Windows
        run: npx electron-builder --win --x64 --publish never

      - name: Zip the exe
        run: |
          cd dist
          Compress-Archive -Path "ChatPro Overlay Setup 1.1.0.exe" -DestinationPath "ChatPro-Overlay-Setup.zip"
        shell: pwsh

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/ChatPro-Overlay-Setup.zip
          token: ${{ secrets.GITHUB_TOKEN }}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com;">
<title>ChatPro Settings</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#111114; --s1:#161619; --s2:#1e1e23; --b1:#2e2e38; --b2:#3d3d4a;
  --t1:#f0f0f5; --t2:#9898b0; --t3:#55556a; --t4:#33333f;
  --pink:#ff4d8f; --r-sm:6px;
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html,body { font-family:'Instrument Sans',sans-serif; background:var(--bg); color:var(--t1); font-size:13px; height:100%; overflow-y:auto; }
.wrap { padding:20px; max-width:480px; }
h1 { font-size:15px; font-weight:700; color:var(--t2); margin-bottom:20px; }
.section { margin-bottom:20px; }
.section-label { font-size:9px; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; color:var(--t3); margin-bottom:10px; }
.field { margin-bottom:12px; }
.field-label { font-size:11px; color:var(--t2); margin-bottom:5px; }
.field-sub { font-size:10px; color:var(--t4); margin-top:4px; line-height:1.5; }
.input { width:100%; background:var(--s2); border:1px solid var(--b1); border-radius:var(--r-sm); color:var(--t1); font-family:'Instrument Sans',sans-serif; font-size:12px; padding:9px 11px; outline:none; }
.input:focus { border-color:var(--b2); }
.input::placeholder { color:var(--t3); }
.divider { height:1px; background:var(--b1); margin:16px 0; }
.toggle-row { display:flex; align-items:center; justify-content:space-between; }
.toggle-label { font-size:12px; color:var(--t2); }
.toggle { width:36px; height:20px; border-radius:10px; background:var(--b2); cursor:pointer; position:relative; transition:background 0.2s; }
.toggle.on { background:var(--pink); }
.toggle::after { content:''; position:absolute; width:14px; height:14px; border-radius:50%; background:white; top:3px; left:3px; transition:transform 0.2s; }
.toggle.on::after { transform:translateX(16px); }
.btn-save { width:100%; background:linear-gradient(135deg,var(--pink),#ff8c69); border:none; border-radius:var(--r-sm); color:white; font-family:'Instrument Sans',sans-serif; font-size:13px; font-weight:600; padding:12px; cursor:pointer; margin-top:4px; }
.btn-save:hover { opacity:0.88; }
.save-msg { display:none; text-align:center; color:var(--pink); font-size:12px; margin-top:8px; }
.version { font-size:10px; color:var(--t4); text-align:center; margin-top:16px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>⚙ ChatPro Settings</h1>

  <div class="section">
    <div class="section-label">Anthropic API Key</div>
    <div class="field">
      <div class="field-label">API Key</div>
      <input class="input" type="password" id="apiKey" placeholder="sk-ant-api03-…" />
      <div class="field-sub">Get your key at <a href="#" onclick="window.chatpro.openUrl('https://console.anthropic.com')" style="color:var(--pink);">console.anthropic.com</a></div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="section">
    <div class="section-label">Auto-detect Clipboard</div>
    <div class="toggle-row">
      <span class="toggle-label">Automatically detect German messages</span>
      <div class="toggle" id="autoDetectToggle" onclick="toggleAutoDetect()"></div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="section">
    <div class="section-label">Hotkey</div>
    <div class="field">
      <div class="field-label">Open overlay shortcut</div>
      <input class="input" id="hotkey" placeholder="CommandOrControl+Shift+T" />
    </div>
  </div>

  <button class="btn-save" onclick="saveSettings()">Save settings</button>
  <div class="save-msg" id="saveMsg">✓ Saved!</div>
  <div class="version" id="versionLabel"></div>
</div>

<script>
let autoDetect = true;

async function init() {
  try {
    var s = await window.chatpro.getSettings();
    document.getElementById('apiKey').value = s.apiKey || '';
    document.getElementById('hotkey').value = s.hotkey || 'CommandOrControl+Shift+T';
    autoDetect = s.autoDetect !== false;
    updateToggle();
    if (s.version) document.getElementById('versionLabel').textContent = 'v' + s.version;
  } catch(e) { console.error('settings init error:', e); }
}
init();

function toggleAutoDetect() {
  autoDetect = !autoDetect;
  updateToggle();
}
function updateToggle() {
  document.getElementById('autoDetectToggle').classList.toggle('on', autoDetect);
}

async function saveSettings() {
  var apiKey = document.getElementById('apiKey').value.trim();
  var hotkey = document.getElementById('hotkey').value.trim() || 'CommandOrControl+Shift+T';
  await window.chatpro.saveSettings({ apiKey: apiKey, hotkey: hotkey, autoDetect: autoDetect });
  var msg = document.getElementById('saveMsg');
  msg.style.display = 'block';
  setTimeout(function() { msg.style.display = 'none'; }, 2000);
}
</script>
</body>
</html>
